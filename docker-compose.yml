version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: crewcontext-postgres
    environment:
      POSTGRES_USER: crew
      POSTGRES_PASSWORD: crew
      POSTGRES_DB: crewcontext
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crew -d crewcontext"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5
    container_name: crewcontext-neo4j
    environment:
      NEO4J_AUTH: neo4j/crewcontext123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p crewcontext123 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  neo4j_data:
